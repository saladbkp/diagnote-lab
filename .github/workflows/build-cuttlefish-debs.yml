name: Android12-5.10 Kernel Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install basic dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl python3 build-essential bc bison flex libssl-dev cpio rsync

      - name: Install repo tool
        run: |
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo version

      - name: Set up Android common kernel source
        run: |
          mkdir -p android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --no-repo-verify \
            --depth=1
          repo sync --force-sync --no-clone-bundle --no-tags -f -c -j8

      - name: Patch version header
        run: |
          sed -i '/#ifndef MY_LINUX_VERSION_CODE/a #define MY_LINUX_VERSION_CODE KERNEL_VERSION(5,10,43)' kerneldriver/ver_control.h

      - name: Copy driver into kernel tree
        run: |
          cd android-kernel
          mkdir -p common/drivers/kerneldriver
          cp -r ../kerneldriver/* common/drivers/kerneldriver/

      - name: Hook driver into drivers/Makefile
        run: |
          cd android-kernel
          grep -q 'kerneldriver/' common/drivers/Makefile || \
            echo 'obj-y += kerneldriver/' >> common/drivers/Makefile

      - name: Show key files
        run: |
          cd android-kernel
          ls -lah common/drivers/kerneldriver
          tail -n 5 common/drivers/Makefile

      - name: Build Android common kernel
        run: |
          cd android-kernel
          BUILD_CONFIG=common/build.config.gki.aarch64 \
          LTO=thin \
          build/build.sh -j"$(nproc)"

      - name: Collect outputs
        run: |
          mkdir -p out-artifacts
          cd android-kernel

          find out -type f \( \
            -name 'Image' -o \
            -name 'Image.lz4' -o \
            -name 'vmlinux' -o \
            -name '*.ko' \) \
            -exec cp --parents {} ../out-artifacts/ \;

          cd ..
          find out-artifacts -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android12-5.10-build-artifacts
          path: out-artifacts/**
          if-no-files-found: error
          retention-days: 14
          compression-level: 0